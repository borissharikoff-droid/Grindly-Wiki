<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item — Grindly Wiki</title>
<link rel="stylesheet" href="style.css">
<style>
/* ══════ Item Page Specific Styles ══════ */
.item-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px;
  background: linear-gradient(180deg, rgba(212,168,67,0.06) 0%, transparent 100%);
  border-bottom: 2px solid var(--border-ornate);
}
.item-header-icon {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  border-radius: 10px;
  border: 2px solid var(--border-ornate);
  background: var(--bg-card);
  flex-shrink: 0;
  overflow: hidden;
}
.item-header-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}
.item-header-info { flex: 1; min-width: 0; }
.item-header-info h1 {
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 4px;
}
.item-header-info .item-tagline {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
}
.item-badges {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.item-badge {
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border-ornate);
  background: rgba(212,168,67,0.06);
}

/* ── Two-column layout ── */
.item-layout {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 0;
  min-height: 400px;
}
.item-main {
  border-right: 1px solid var(--border-inner);
  min-width: 0;
  overflow: hidden;
}
.item-sidebar-right {
  padding: 14px;
  background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-page) 100%);
  min-width: 0;
  overflow: hidden;
}

/* ── Price box ── */
.price-box {
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 14px;
}
.price-box h3 {
  font-family: var(--font-title);
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-inner);
}
.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.price-label { color: var(--text-dim); }
.price-value { font-family: var(--font-mono); color: var(--text-bright); font-weight: 600; }
.price-change { font-family: var(--font-mono); font-size: 11px; }
.price-change.up { color: #4ade80; }
.price-change.down { color: #ef4444; }
.price-change.neutral { color: var(--text-dim); }
.price-current {
  font-family: var(--font-title);
  font-size: 28px;
  color: var(--gold-bright);
  text-align: center;
  padding: 8px 0 12px;
  border-bottom: 1px solid var(--border-inner);
  margin-bottom: 8px;
}
.price-current span {
  font-size: 14px;
  color: var(--text-dim);
  font-family: var(--font-body);
}

/* ── Chart ── */
.chart-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.chart-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.chart-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
.chart-tab {
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border-ornate);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
}
.chart-tab:hover { color: var(--gold); border-color: var(--gold-dim); }
.chart-tab.active {
  background: rgba(212,168,67,0.12);
  color: var(--gold);
  border-color: var(--gold-dim);
}
.chart-canvas-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 12px;
}
canvas.price-chart {
  width: 100%;
  height: 180px;
  display: block;
}
.chart-legend {
  display: flex;
  gap: 16px;
  margin-top: 6px;
  font-size: 10px;
}
.chart-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text-dim);
}
.chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* ── Stats section ── */
.stats-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.stats-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.stat-card-value {
  word-break: break-word;
}
.stat-card {
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 6px;
}
.stat-card-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stat-card-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
}

/* ── Source / recipe section ── */
.source-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.source-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.source-list { list-style: none; }
.source-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  margin-bottom: 6px;
  font-size: 12px;
}
.source-icon { font-size: 18px; flex-shrink: 0; }
.source-detail { flex: 1; }
.source-detail strong { color: var(--text-bright); }
.source-detail small { color: var(--text-dim); display: block; font-size: 10px; margin-top: 2px; }
.recipe-ingredients {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.recipe-ing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(212,168,67,0.06);
  border: 1px solid var(--border-inner);
  font-size: 11px;
  color: var(--text);
}
.recipe-ing a { color: var(--gold); }

/* ── Related items ── */
.related-items { margin-top: 14px; }
.related-items h4 {
  font-family: var(--font-title);
  font-size: 11px;
  color: var(--gold);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-inner);
}
.related-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text);
  text-decoration: none;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.related-item:hover { background: var(--gold-glow); color: var(--gold); }
.related-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
.related-rarity {
  font-size: 8px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  margin-left: auto;
}

/* ── 404 ── */
.item-not-found {
  text-align: center;
  padding: 60px 24px;
}
.item-not-found h2 {
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 8px;
}
.item-not-found p { color: var(--text-dim); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .item-layout { grid-template-columns: 1fr; }
  .item-main { border-right: none; }
  .item-sidebar-right { border-top: 1px solid var(--border-inner); }
}
@media (max-width: 768px) {
  .item-header { padding: 14px 16px; gap: 12px; }
  .item-header-icon { width: 56px; height: 56px; font-size: 32px; }
  .item-header-info h1 { font-size: 18px; }
  .item-badges { gap: 4px; }
  .item-badge { font-size: 9px; padding: 2px 7px; }
  .chart-section, .stats-section, .source-section { padding: 14px 16px; }
  .stat-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  canvas.price-chart { height: 140px; }
  .price-current { font-size: 22px; }
}
</style>

// IP calc
var IP_BY_RARITY = { common:100, rare:150, epic:220, legendary:320, mythic:450 };
var SLOT_IP_MULT = { weapon:1.2, head:1.1, body:1.1 };
var PERK_IP = {
  atk_boost: function(v){return v*15},
  hp_boost: function(v){return v*0.5},
  hp_regen_boost: function(v){return v*25},
  xp_skill_boost: function(v){return Math.max(0,v-1)*150},
  xp_global_boost: function(v){return Math.max(0,v-1)*300},
  chest_drop_boost: function(v){return v*800},
  focus_boost: function(v){return Math.max(0,v-1)*120},
  streak_shield: function(){return 60},
};

function calcIP(item) {
  var base = IP_BY_RARITY[item.rarity] || 100;
  var stat = 0;
  (item.perks||[]).forEach(function(p) {
    var fn = PERK_IP[p.type];
    if (fn) stat += fn(typeof p.value === 'number' ? p.value : parseFloat(p.value)||0);
  });
  var mult = SLOT_IP_MULT[item.slot] || 1.0;
  return Math.round((base + stat) * mult);
}

function formatTime(sec) {
  if (sec < 60) return sec + 's';
  var m = Math.floor(sec/60), s = sec%60;
  if (m < 60) return s > 0 ? m+'m '+s+'s' : m+'m';
  var h = Math.floor(m/60), rm = m%60;
  return rm > 0 ? h+'h '+rm+'m' : h+'h';
}

// Seeded random for consistent "price history" per item
function seededRandom(seed) {
  var x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function generatePriceHistory(itemId, days) {
  var base = BASE_PRICES[ITEM_MAP[itemId]?.rarity] || 50;
  var seed = 0;
  for (var i = 0; i < itemId.length; i++) seed += itemId.charCodeAt(i) * (i+1);
  var prices = [];
  var volumes = [];
  var price = base;
  for (var d = 0; d < days; d++) {
    var r = seededRandom(seed + d * 7.3);
    var change = (r - 0.48) * base * 0.08;
    price = Math.max(1, Math.round(price + change));
    prices.push(price);
    volumes.push(Math.round(seededRandom(seed + d * 13.7) * 120 + 10));
  }
  return { prices: prices, volumes: volumes };
}

function drawChart(canvas, data, color, fillColor) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth;
  var h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var padY = 20;

  // Grid
  ctx.strokeStyle = 'rgba(212,168,67,0.08)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 5; i++) {
    var gy = padY + (h - 2*padY) * i / 4;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(w, gy);
    ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = 'rgba(122,111,90,0.6)';
  ctx.font = '9px Inter, sans-serif';
  for (var i = 0; i < 5; i++) {
    var val = Math.round(max - (range * i / 4));
    var gy = padY + (h - 2*padY) * i / 4;
    ctx.fillText(val + 'g', 4, gy - 3);
  }

  // Fill
  ctx.beginPath();
  for (var i = 0; i < data.length; i++) {
    var x = (i / (data.length - 1)) * w;
    var y = padY + (1 - (data[i] - min) / range) * (h - 2*padY);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();

  // Line
  ctx.beginPath();
  for (var i = 0; i < data.length; i++) {
    var x = (i / (data.length - 1)) * w;
    var y = padY + (1 - (data[i] - min) / range) * (h - 2*padY);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawBarChart(canvas, data, color) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth;
  var h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  var max = Math.max.apply(null, data) || 1;
  var barW = Math.max(1, (w / data.length) - 1);

  for (var i = 0; i < data.length; i++) {
    var barH = (data[i] / max) * (h - 10);
    var x = (i / data.length) * w;
    var y = h - barH;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, barW, barH);
  }
}

      var orc = RARITY_COLORS[outItem.rarity];
      html += '<li class="source-item"><span class="source-icon">'+outItem.icon+'</span><div class="source-detail"><strong><a href="item.html?id='+r.out+'" style="color:'+orc.color+'">'+outItem.name+'</a></strong><small>Crafter Lvl.'+r.lvl+' \u2022 Requires '+r.ing.map(function(i){var n=ITEM_MAP[i.id]; return (n?n.name:i.id)+' \u00D7'+i.qty}).join(', ')+'</small></div></li>';
    });
    html += '</ul></div>';
  }

  html += '</div>'; // end item-main

  // ── Right sidebar ──
  html += '<div class="item-sidebar-right">';

  // Price box
  html += '<div class="price-box"><h3>Marketplace Price</h3>';
  if (HAS_MARKET_DATA) {
    html += '<div class="price-current">'+currentPrice+' <span>gold</span></div>';
    html += '<div class="price-row"><span class="price-label">Today\'s Change</span>'+changeStr(day1, currentPrice)+'</div>';
    html += '<div class="price-row"><span class="price-label">1 Month Change</span>'+changeStr(mo1, currentPrice)+'</div>';
    html += '<div class="price-row"><span class="price-label">3 Month Change</span>'+changeStr(mo3, currentPrice)+'</div>';
    html += '<div class="price-row"><span class="price-label">6 Month Change</span>'+changeStr(mo6, currentPrice)+'</div>';
  } else {
    html += '<div class="price-current" style="color:var(--text-dim);font-size:18px">N/A</div>';
    html += '<div class="price-row"><span class="price-label">Today\'s Change</span><span class="price-change neutral">N/A</span></div>';
    html += '<div class="price-row"><span class="price-label">1 Month Change</span><span class="price-change neutral">N/A</span></div>';
    html += '<div class="price-row"><span class="price-label">3 Month Change</span><span class="price-change neutral">N/A</span></div>';
    html += '<div class="price-row"><span class="price-label">6 Month Change</span><span class="price-change neutral">N/A</span></div>';
  }
  html += '</div>';

  // Item details box
  html += '<div class="price-box"><h3>Item Details</h3>';
  html += '<div class="price-row"><span class="price-label">Slot</span><span class="price-value">'+(SLOT_LABELS[item.slot]||item.slot)+'</span></div>';
  html += '<div class="price-row"><span class="price-label">Rarity</span><span class="price-value" style="color:'+rc.color+'">'+item.rarity.charAt(0).toUpperCase()+item.rarity.slice(1)+'</span></div>';
  if (ip !== null) html += '<div class="price-row"><span class="price-label">Item Power</span><span class="price-value" style="color:var(--gold)">'+ip+'</span></div>';
  html += '<div class="price-row"><span class="price-label">Tradeable</span><span class="price-value">'+(item.id.indexOf('potion')!==-1?'No':'Yes')+'</span></div>';
  html += '<div class="price-row"><span class="price-label">Last Updated</span><span class="price-value" style="font-size:10px;color:var(--text-dim)">'+new Date().toLocaleDateString()+'</span></div>';
  html += '</div>';

  // Related items
  if (related.length > 0) {
    html += '<div class="related-items"><h4>Related Items \u2014 '+(SLOT_LABELS[item.slot]||item.slot)+'</h4>';
    related.forEach(function(r) {
      var rrc = RARITY_COLORS[r.rarity];
      html += '<a href="item.html?id='+r.id+'" class="related-item"><span class="related-icon">'+r.icon+'</span><span>'+r.name+'</span><span class="related-rarity" style="color:'+rrc.color+'">'+r.rarity+'</span></a>';
    });
    html += '</div>';
  }

  html += '</div>'; // end sidebar
  html += '</div>'; // end layout

  main.innerHTML = html;

  // Draw charts (only if real market data exists)
  if (HAS_MARKET_DATA) {
    var days = 30;
    function redrawCharts() {
      var priceCanvas = document.getElementById('priceChart');
      var volumeCanvas = document.getElementById('volumeChart');
      if (priceCanvas) {
        var slice = history.prices.slice(-days);
        drawChart(priceCanvas, slice, '#d4a843', 'rgba(212,168,67,0.1)');
      }
      if (volumeCanvas) {
        var vslice = history.volumes.slice(-days);
        drawBarChart(volumeCanvas, vslice, 'rgba(96,165,250,0.4)');
      }
    }
    redrawCharts();
    document.querySelectorAll('#priceTabs .chart-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('#priceTabs .chart-tab').forEach(function(t){t.classList.remove('active')});
        this.classList.add('active');
        days = parseInt(this.getAttribute('data-days'));
        redrawCharts();
      });
    });
    window.addEventListener('resize', redrawCharts);
  }
}

// ── Search ──
(function() {
  var input = document.getElementById('searchInput');
  var results = document.getElementById('searchResults');

  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    results.innerHTML = '';
    if (q.length < 2) { results.classList.remove('active'); return; }

    var matches = ITEMS.filter(function(i) {
      return i.name.toLowerCase().includes(q) || i.id.includes(q) || (i.rarity||'').includes(q) || (SLOT_LABELS[i.slot]||'').toLowerCase().includes(q);
    }).slice(0, 10);

    if (matches.length === 0) {
      results.innerHTML = '<div class="search-result-item" style="color:var(--text-dim);cursor:default">No results</div>';
      results.classList.add('active');
      return;
    }

    matches.forEach(function(m) {
      var div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = '<span class="search-result-icon">'+m.icon+'</span><span class="search-result-name">'+m.name+'</span><span class="search-result-tag">'+(SLOT_LABELS[m.slot]||m.slot)+'</span>';
      div.addEventListener('click', function() {
        window.location.href = 'item.html?id='+m.id;
      });
      results.appendChild(div);
    });
    results.classList.add('active');
  });

  document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrap')) results.classList.remove('active'); });
  input.addEventListener('keydown', function(e) { if (e.key==='Escape') { results.classList.remove('active'); this.value=''; } });
})();

// ── Market Movers sidebar ──
(function() {
  var list = document.getElementById('marketMovers');
  var movers = ITEMS.filter(function(i){return ARMOR_SLOTS.indexOf(i.slot)!==-1}).sort(function(a,b){
    return (BASE_PRICES[b.rarity]||0)-(BASE_PRICES[a.rarity]||0);
  }).slice(0,6);
  movers.forEach(function(m) {
    var li = document.createElement('li');
    li.innerHTML = '<a href="item.html?id='+m.id+'" class="nav-link"><span class="nav-dot" style="background:'+RARITY_COLORS[m.rarity].color+'"></span> '+m.name+'</a>';
    list.appendChild(li);
  });
})();

// ── Collapsible nav ──
document.querySelectorAll('.nav-group-title').forEach(function(t) {
  t.addEventListener('click', function() { this.parentElement.classList.toggle('collapsed'); });
});

// ── Init ──
var params = new URLSearchParams(window.location.search);
var itemId = params.get('id');
if (itemId) {
  renderItem(itemId);
} else {
  document.getElementById('mainContent').innerHTML = '<div class="item-not-found"><h2>Item Database</h2><p>Use the search bar or select an item from the <a href="index.html">wiki homepage</a>.</p></div>';
}
</script>

</body>
</html>
