<style>
/* ══════ Item Page Specific Styles ══════ */
.item-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px;
  background: linear-gradient(180deg, rgba(212,168,67,0.06) 0%, transparent 100%);
  border-bottom: 2px solid var(--border-ornate);
}
.item-header-icon {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  border-radius: 10px;
  border: 2px solid var(--border-ornate);
  background: var(--bg-card);
  flex-shrink: 0;
  overflow: hidden;
}
.item-header-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}
.item-header-info { flex: 1; min-width: 0; }
.item-header-info h1 {
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 4px;
}
.item-header-info .item-tagline {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
}
.item-badges {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.item-badge {
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border-ornate);
  background: rgba(212,168,67,0.06);
}

/* ── Two-column layout ── */
.item-layout {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 0;
  min-height: 400px;
}
.item-main {
  border-right: 1px solid var(--border-inner);
  min-width: 0;
  overflow: hidden;
}
.item-sidebar-right {
  padding: 14px;
  background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-page) 100%);
  min-width: 0;
  overflow: hidden;
}

/* ── Price box ── */
.price-box {
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 14px;
}
.price-box h3 {
  font-family: var(--font-title);
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-inner);
}
.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.price-label { color: var(--text-dim); }
.price-value { font-family: var(--font-mono); color: var(--text-bright); font-weight: 600; }
.price-change { font-family: var(--font-mono); font-size: 11px; }
.price-change.up { color: #4ade80; }
.price-change.down { color: #ef4444; }
.price-change.neutral { color: var(--text-dim); }
.price-current {
  font-family: var(--font-title);
  font-size: 28px;
  color: var(--gold-bright);
  text-align: center;
  padding: 8px 0 12px;
  border-bottom: 1px solid var(--border-inner);
  margin-bottom: 8px;
}
.price-current span {
  font-size: 14px;
  color: var(--text-dim);
  font-family: var(--font-body);
}

/* ── Chart ── */
.chart-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.chart-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.chart-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
.chart-tab {
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border-ornate);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
}
.chart-tab:hover { color: var(--gold); border-color: var(--gold-dim); }
.chart-tab.active {
  background: rgba(212,168,67,0.12);
  color: var(--gold);
  border-color: var(--gold-dim);
}
.chart-canvas-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 12px;
}
canvas.price-chart {
  width: 100%;
  height: 180px;
  display: block;
}
.chart-legend {
  display: flex;
  gap: 16px;
  margin-top: 6px;
  font-size: 10px;
}
.chart-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text-dim);
}
.chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* ── Stats section ── */
.stats-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.stats-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.stat-card-value {
  word-break: break-word;
}
.stat-card {
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  border-radius: 6px;
}
.stat-card-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stat-card-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
}

/* ── Source / recipe section ── */
.source-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-inner);
}
.source-section h3 {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 10px;
}
.source-list { list-style: none; }
.source-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border-ornate);
  margin-bottom: 6px;
  font-size: 12px;
}
.source-icon { font-size: 18px; flex-shrink: 0; width: 24px; height: 24px; overflow: hidden; }
.source-icon img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
.source-detail { flex: 1; }
.source-detail strong { color: var(--text-bright); }
.source-detail small { color: var(--text-dim); display: block; font-size: 10px; margin-top: 2px; }
.recipe-ingredients {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.recipe-ing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(212,168,67,0.06);
  border: 1px solid var(--border-inner);
  font-size: 11px;
  color: var(--text);
}
.recipe-ing a { color: var(--gold); }

/* ── Related items ── */
.related-items { margin-top: 14px; }
.related-items h4 {
  font-family: var(--font-title);
  font-size: 11px;
  color: var(--gold);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-inner);
}
.related-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text);
  text-decoration: none;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.related-item:hover { background: var(--gold-glow); color: var(--gold); }
.related-icon { font-size: 16px; flex-shrink: 0; width: 22px; height: 22px; text-align: center; overflow: hidden; }
.related-icon img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
.related-rarity {
  font-size: 8px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  margin-left: auto;
}

/* ── Loot Pool Grid (chest items) ── */
.related-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
}
.related-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 6px;
  border-radius: 8px;
  border: 1px solid var(--border-inner);
  background: var(--bg-card);
  text-decoration: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  text-align: center;
}
.related-card:hover {
  border-color: var(--gold-dim);
  box-shadow: 0 0 8px rgba(212,168,67,0.15);
}
.related-card .related-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border-radius: 6px;
  border: 1px solid var(--border-inner);
  overflow: hidden;
}
.related-card .related-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.related-card .related-name {
  font-size: 10px;
  font-family: var(--font-mono);
  line-height: 1.2;
}

/* ── 404 ── */
.item-not-found {
  text-align: center;
  padding: 60px 24px;
}
.item-not-found h2 {
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 8px;
}
.item-not-found p { color: var(--text-dim); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .item-layout { grid-template-columns: 1fr; }
  .item-main { border-right: none; }
  .item-sidebar-right { border-top: 1px solid var(--border-inner); }
}
@media (max-width: 768px) {
  .item-header { padding: 14px 16px; gap: 12px; }
  .item-header-icon { width: 56px; height: 56px; font-size: 32px; }
  .item-header-info h1 { font-size: 18px; }
  .item-badges { gap: 4px; }
  .item-badge { font-size: 9px; padding: 2px 7px; }
  .chart-section, .stats-section, .source-section { padding: 14px 16px; }
  .stat-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  canvas.price-chart { height: 140px; }
  .price-current { font-size: 22px; }
}
</style>

// IP calc
var IP_BY_RARITY = { common:100, rare:150, epic:220, legendary:320, mythic:450 };
var SLOT_IP_MULT = { weapon:1.2, head:1.1, body:1.1 };
var PERK_IP = {
  atk_boost: function(v){return v*15},
  hp_boost: function(v){return v*0.5},
  hp_regen_boost: function(v){return v*25},
  xp_skill_boost: function(v){return Math.max(0,v-1)*150},
  xp_global_boost: function(v){return Math.max(0,v-1)*300},
  chest_drop_boost: function(v){return v*800},
  focus_boost: function(v){return Math.max(0,v-1)*120},
  streak_shield: function(){return 60},
  def_boost: function(v){return v*20},
};

function calcIP(item) {
  var base = IP_BY_RARITY[item.rarity] || 100;
  var stat = 0;
  (item.perks||[]).forEach(function(p) {
    var fn = PERK_IP[p.type];
    if (fn) stat += fn(typeof p.value === 'number' ? p.value : parseFloat(p.value)||0);
  });
  var mult = SLOT_IP_MULT[item.slot] || 1.0;
  return Math.round((base + stat) * mult);
}

function formatTime(sec) {
  if (sec < 60) return sec + 's';
  var m = Math.floor(sec/60), s = sec%60;
  if (m < 60) return s > 0 ? m+'m '+s+'s' : m+'m';
  var h = Math.floor(m/60), rm = m%60;
  return rm > 0 ? h+'h '+rm+'m' : h+'h';
}

// Fetch marketplace data from Supabase
function fetchMarketData(itemId, callback) {
  var url = window.WIKI_SUPABASE_URL;
  var key = window.WIKI_SUPABASE_KEY;
  if (!url || !key) { callback(null, null); return; }

  var headers = { 'apikey': key, 'Authorization': 'Bearer ' + key };
  var activeResult = null;
  var historyResult = null;
  var done = 0;

  function finish() {
    done++;
    if (done >= 2) callback(activeResult, historyResult);
  }

  // 1) Active listings (always accessible via RLS)
  fetch(url + '/rest/v1/marketplace_listings?item_id=eq.' + encodeURIComponent(itemId) + '&status=eq.active&select=price_gold,quantity,created_at&order=price_gold.asc', { headers: headers })
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(function(rows) {
      if (rows && rows.length > 0) activeResult = rows;
      finish();
    }).catch(function() { finish(); });

  // 2) Trade history (sold listings from marketplace_listings)
  fetch(url + '/rest/v1/marketplace_listings?item_id=eq.' + encodeURIComponent(itemId) + '&status=eq.sold&select=price_gold,quantity,created_at&order=created_at.asc', { headers: headers })
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(function(rows) {
      if (rows && rows.length > 0) {
        var byDay = {};
        rows.forEach(function(r) {
          var day = (r.created_at || '').substring(0, 10);
          if (!day) return;
          if (!byDay[day]) byDay[day] = { prices: [], volumes: 0 };
          byDay[day].prices.push(Math.round((r.price_gold || 0) / (r.quantity || 1)));
          byDay[day].volumes += (r.quantity || 1);
        });
        var days = Object.keys(byDay).sort();
        var prices = [], volumes = [];
        days.forEach(function(d) {
          var arr = byDay[d].prices;
          prices.push(Math.round(arr.reduce(function(a,b){return a+b},0) / arr.length));
          volumes.push(byDay[d].volumes);
        });
        historyResult = { prices: prices, volumes: volumes, days: days, totalTrades: rows.length };
      }
      finish();
    }).catch(function() { finish(); });
}

function drawChart(canvas, data, color, fillColor) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth;
  var h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var padY = 20;

  // Grid
  ctx.strokeStyle = 'rgba(212,168,67,0.08)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 5; i++) {
    var gy = padY + (h - 2*padY) * i / 4;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(w, gy);
    ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = 'rgba(122,111,90,0.6)';
  ctx.font = '9px Inter, sans-serif';
  for (var i = 0; i < 5; i++) {
    var val = Math.round(max - (range * i / 4));
    var gy = padY + (h - 2*padY) * i / 4;
    ctx.fillText(val + 'g', 4, gy - 3);
  }

  // Fill
  ctx.beginPath();
  for (var i = 0; i < data.length; i++) {
    var x = (i / (data.length - 1)) * w;
    var y = padY + (1 - (data[i] - min) / range) * (h - 2*padY);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();

  // Line
  ctx.beginPath();
  for (var i = 0; i < data.length; i++) {
    var x = (i / (data.length - 1)) * w;
    var y = padY + (1 - (data[i] - min) / range) * (h - 2*padY);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawBarChart(canvas, data, color) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth;
  var h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  var max = Math.max.apply(null, data) || 1;
  var barW = Math.max(1, (w / data.length) - 1);

  for (var i = 0; i < data.length; i++) {
    var barH = (data[i] / max) * (h - 10);
    var x = (i / data.length) * w;
    var y = h - barH;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, barW, barH);
  }
}

  if (isTradeable) {
    fetchMarketData(itemId, function(active, history) {
      var priceHistEl = document.getElementById('priceHistoryContent');
      var volumeEl = document.getElementById('volumeContent');
      var priceBoxEl = document.getElementById('priceBoxContent');

      // ── Sidebar price box: show active listings data ──
      if (priceBoxEl) {
        if (active && active.length > 0) {
          var lowest = active[0].price_gold;
          var highest = active[active.length - 1].price_gold;
          var totalQty = 0;
          active.forEach(function(r) { totalQty += (r.quantity || 1); });
          priceBoxEl.innerHTML =
            '<div class="price-current">' + lowest + ' <span>gold</span></div>' +
            '<div class="price-row"><span class="price-label">Lowest Ask</span><span class="price-value" style="color:#4ade80">' + lowest + 'g</span></div>' +
            '<div class="price-row"><span class="price-label">Highest Ask</span><span class="price-value" style="color:#f87171">' + highest + 'g</span></div>' +
            '<div class="price-row"><span class="price-label">Active Listings</span><span class="price-value">' + active.length + '</span></div>' +
            '<div class="price-row"><span class="price-label">Total Quantity</span><span class="price-value">' + totalQty + '</span></div>';
        } else {
          priceBoxEl.innerHTML =
            '<div class="price-current" style="color:var(--text-dim);font-size:16px">No listings</div>' +
            '<div class="price-row"><span class="price-label">Active Listings</span><span class="price-value">0</span></div>';
        }
      }

      // ── Price history chart (requires sold listings via RLS) ──
      if (history && history.prices.length >= 2) {
        var prices = history.prices;
        var volumes = history.volumes;

        if (priceHistEl) {
          var chartDays = Math.min(30, prices.length);
          priceHistEl.innerHTML =
            '<div class="chart-tabs" id="priceTabs">' +
            '<button class="chart-tab active" data-days="30">30d</button>' +
            (prices.length > 30 ? '<button class="chart-tab" data-days="90">90d</button>' : '') +
            (prices.length > 90 ? '<button class="chart-tab" data-days="0">All</button>' : '') +
            '</div>' +
            '<canvas class="price-chart" id="priceChart"></canvas>' +
            '<div class="chart-legend"><div class="chart-legend-item"><div class="chart-legend-dot" style="background:#d4a843"></div> Avg Sale Price (gold)</div></div>';

          function redrawPrice() {
            var canvas = document.getElementById('priceChart');
            if (!canvas) return;
            var slice = chartDays > 0 ? prices.slice(-chartDays) : prices;
            drawChart(canvas, slice, '#d4a843', 'rgba(212,168,67,0.1)');
          }
          redrawPrice();
          document.querySelectorAll('#priceTabs .chart-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
              document.querySelectorAll('#priceTabs .chart-tab').forEach(function(t){t.classList.remove('active')});
              this.classList.add('active');
              chartDays = parseInt(this.getAttribute('data-days'));
              redrawPrice();
            });
          });
          window.addEventListener('resize', redrawPrice);
        }

        if (volumeEl) {
          volumeEl.innerHTML = '<canvas class="price-chart" id="volumeChart"></canvas>';
          function redrawVol() {
            var canvas = document.getElementById('volumeChart');
            if (canvas) drawBarChart(canvas, volumes.slice(-30), 'rgba(96,165,250,0.4)');
          }
          redrawVol();
          window.addEventListener('resize', redrawVol);
        }
      } else {
        // No sold history accessible
        if (priceHistEl) priceHistEl.innerHTML = '<div style="text-align:center;padding:28px 12px;color:var(--text-dim);font-size:12px">No trade history available yet.</div>';
        if (volumeEl) volumeEl.innerHTML = '<div style="text-align:center;padding:28px 12px;color:var(--text-dim);font-size:12px">N/A</div>';
      }
    });
  } else {
    // Non-tradeable items
    var phEl = document.getElementById('priceHistoryContent');
    var vEl = document.getElementById('volumeContent');
    var pbEl = document.getElementById('priceBoxContent');
    if (phEl) phEl.innerHTML = '<div style="text-align:center;padding:20px 12px;color:var(--text-dim);font-size:12px">This item is not tradeable.</div>';
    if (vEl) vEl.innerHTML = '<div style="text-align:center;padding:20px 12px;color:var(--text-dim);font-size:12px">N/A</div>';
    if (pbEl) pbEl.innerHTML = '<div class="price-current" style="color:var(--text-dim);font-size:14px">Not Tradeable</div>';
  }
}

// ── Search ──
(function() {
  var input = document.getElementById('searchInput');
  var results = document.getElementById('searchResults');
  if (!input || !results) return;

  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    results.innerHTML = '';
    if (q.length < 2) { results.classList.remove('active'); return; }

    var matches = ITEMS.filter(function(i) {
      return i.name.toLowerCase().includes(q) || i.id.includes(q) || (i.rarity||'').includes(q) || (SLOT_LABELS[i.slot]||'').toLowerCase().includes(q);
    }).slice(0, 10);

    if (matches.length === 0) {
      results.innerHTML = '<div class="search-result-item" style="color:var(--text-dim);cursor:default">No results</div>';
      results.classList.add('active');
      return;
    }

    matches.forEach(function(m) {
      var div = document.createElement('div');
      div.className = 'search-result-item';
      var searchIconHtml = m.image ? '<img src="'+m.image+'" style="width:16px;height:16px;object-fit:contain">' : m.icon;
      div.innerHTML = '<span class="search-result-icon">'+searchIconHtml+'</span><span class="search-result-name">'+m.name+'</span><span class="search-result-tag">'+(SLOT_LABELS[m.slot]||m.slot)+'</span>';
      div.addEventListener('click', function() {
        window.location.href = 'item.html?id='+m.id;
      });
      results.appendChild(div);
    });
    results.classList.add('active');
  });

  document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrap')) results.classList.remove('active'); });
  input.addEventListener('keydown', function(e) { if (e.key==='Escape') { results.classList.remove('active'); this.value=''; } });
})();

// ── Market Movers sidebar ──
(function() {
  var list = document.getElementById('marketMovers');
  if (!list) return;
  var RARITY_RANK = {common:0,rare:1,epic:2,legendary:3,mythic:4};
  var movers = ITEMS.filter(function(i){return ARMOR_SLOTS.indexOf(i.slot)!==-1}).sort(function(a,b){
    return (RARITY_RANK[b.rarity]||0)-(RARITY_RANK[a.rarity]||0);
  }).slice(0,6);
  movers.forEach(function(m) {
    var li = document.createElement('li');
    li.innerHTML = '<a href="item.html?id='+m.id+'" class="nav-link"><span class="nav-dot" style="background:'+RARITY_COLORS[m.rarity].color+'"></span> '+m.name+'</a>';
    list.appendChild(li);
  });
})();

// ── Collapsible nav ──
document.querySelectorAll('.nav-group-title').forEach(function(t) {
  t.addEventListener('click', function() { this.parentElement.classList.toggle('collapsed'); });
});

// ── Supabase Admin Config (load item images/skins from dashboard) ──
var SUPABASE_CONFIG = {
  // These will be populated from wiki-config.js if it exists
  url: '',
  anonKey: ''
};

// Try to load config from a separate file (create wiki-config.js with your Supabase credentials)
// Format: window.WIKI_SUPABASE_URL = '...'; window.WIKI_SUPABASE_KEY = '...';
if (window.WIKI_SUPABASE_URL) SUPABASE_CONFIG.url = window.WIKI_SUPABASE_URL;
if (window.WIKI_SUPABASE_KEY) SUPABASE_CONFIG.anonKey = window.WIKI_SUPABASE_KEY;

function applyAdminImages(config) {
  var changed = false;
  // Item overrides (image/icon changes from dashboard)
  if (config.itemOverrides) {
    for (var id in config.itemOverrides) {
      var item = ITEM_MAP[id];
      if (item && config.itemOverrides[id].image) {
        item.image = config.itemOverrides[id].image;
        changed = true;
      }
      if (item && config.itemOverrides[id].icon) {
        item.icon = config.itemOverrides[id].icon;
        changed = true;
      }
      if (item && config.itemOverrides[id].name) {
        item.name = config.itemOverrides[id].name;
        changed = true;
      }
    }
  }
  // Seed overrides (image/icon/name changes from dashboard)
  if (config.seedOverrides) {
    for (var sid in config.seedOverrides) {
      var seedItem = ITEM_MAP[sid];
      if (seedItem && config.seedOverrides[sid].image) {
        seedItem.image = config.seedOverrides[sid].image;
        changed = true;
      }
      if (seedItem && config.seedOverrides[sid].icon) {
        seedItem.icon = config.seedOverrides[sid].icon;
        changed = true;
      }
      if (seedItem && config.seedOverrides[sid].name) {
        seedItem.name = config.seedOverrides[sid].name;
        changed = true;
      }
    }
  }
  // Chest overrides (image/icon changes from dashboard)
  if (config.chestOverrides) {
    for (var cid in config.chestOverrides) {
      // Patch ITEM_MAP entry if exists
      var chestItem = ITEM_MAP[cid];
      if (chestItem && config.chestOverrides[cid].image) {
        chestItem.image = config.chestOverrides[cid].image;
        changed = true;
      }
      if (chestItem && config.chestOverrides[cid].icon) {
        chestItem.icon = config.chestOverrides[cid].icon;
        changed = true;
      }
      // Also patch CHESTS object
      if (typeof CHESTS !== 'undefined' && CHESTS[cid]) {
        if (config.chestOverrides[cid].image) { CHESTS[cid].image = config.chestOverrides[cid].image; changed = true; }
        if (config.chestOverrides[cid].icon) { CHESTS[cid].icon = config.chestOverrides[cid].icon; changed = true; }
      }
    }
  }
  // Custom items (new items added from dashboard)
  if (config.customItems) {
    config.customItems.forEach(function(ci) {
      if (!ITEM_MAP[ci.id]) {
        var newItem = {
          id: ci.id, name: ci.name, slot: ci.slot || 'material',
          rarity: ci.rarity || 'common', icon: ci.icon || '?',
          image: ci.image || '', desc: ci.description || '',
          perks: ci.perks || []
        };
        ITEMS.push(newItem);
        ITEM_MAP[ci.id] = newItem;
        changed = true;
      } else if (ci.image) {
        ITEM_MAP[ci.id].image = ci.image;
        changed = true;
      }
    });
  }
  return changed;
}

function loadSupabaseConfig() {
  if (!SUPABASE_CONFIG.url || !SUPABASE_CONFIG.anonKey) return;
  var url = SUPABASE_CONFIG.url + '/rest/v1/admin_config?id=eq.singleton&select=config';
  fetch(url, {
    headers: {
      'apikey': SUPABASE_CONFIG.anonKey,
      'Authorization': 'Bearer ' + SUPABASE_CONFIG.anonKey
    }
  }).then(function(r) { return r.json(); })
    .then(function(rows) {
      if (rows && rows[0] && rows[0].config) {
        // Update shared cache for instant load next visit
        try { localStorage.setItem('wiki_admin_config', JSON.stringify(rows[0].config)); } catch(e) {}
        var didChange = applyAdminImages(rows[0].config);
        // Re-render current item if images changed
        if (didChange && currentItemId) {
          renderItem(currentItemId);
        }
      }
    }).catch(function() { /* offline or no access */ });
}


// ── Init ──
// Apply cached admin config BEFORE first render (no emoji flash)
try {
  var _cached = localStorage.getItem('wiki_admin_config');
  if (_cached) applyAdminImages(JSON.parse(_cached));
} catch(e) {}

var params = new URLSearchParams(window.location.search);
var currentItemId = params.get('id');
if (currentItemId) {
  renderItem(currentItemId);
} else {
  document.getElementById('mainContent').innerHTML = '<div class="item-not-found"><h2>Item Database</h2><p>Use the search bar or select an item from the <a href="index.html">wiki homepage</a>.</p></div>';
}

// Fetch fresh config in background (updates cache + re-renders if changed)
loadSupabaseConfig();
</script>
